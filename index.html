<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Social_Engine — Demo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Courier New',monospace;background:#0f0f0f;color:#ededed;min-height:100vh}
.no-scroll{overflow:hidden}
.no-sb::-webkit-scrollbar{display:none}
.no-sb{-ms-overflow-style:none;scrollbar-width:none}
input,select,textarea{font-family:inherit}
button{font-family:inherit;cursor:pointer}

/* ── MOBILE RESPONSIVE LAYER ── */

/* Nav: stack on small screens */
@media(max-width:600px){
  #se-nav{
    flex-wrap:wrap;
    gap:10px;
    padding:10px 14px;
  }
  #se-nav-left{
    width:100%;
  }
  #se-nav-links{
    width:100%;
    justify-content:space-between;
    gap:0;
  }
  #se-nav-links button{
    flex:1;
    text-align:center;
    padding:6px 4px;
    font-size:10px;
  }
}

/* Main padding */
@media(max-width:600px){
  #se-main{
    padding:1rem !important;
  }
}

/* Card grid: 3 cols on mobile */
@media(max-width:600px){
  .se-card-grid{
    grid-template-columns: repeat(3, 1fr) !important;
    gap:8px !important;
  }
}

/* Registry rows: wrap on mobile */
@media(max-width:600px){
  .se-registry-row{
    flex-wrap:wrap;
    gap:0;
  }
  .se-registry-info{
    width:100%;
    border-bottom:1px solid rgba(255,255,255,0.04);
  }
  .se-registry-bar{
    flex:1 !important;
    width:auto !important;
    padding:6px 12px !important;
  }
  .se-registry-date{
    padding:6px 12px !important;
    text-align:left !important;
    width:auto !important;
  }
  .se-registry-archbtn{
    height:36px !important;
  }
}

/* Calendar: stack columns on mobile */
@media(max-width:700px){
  .se-cal-wrap{
    flex-direction:column !important;
    min-height:unset !important;
  }
  .se-cal-left{
    border-right:none !important;
    border-bottom:1px solid rgba(255,255,255,0.08);
  }
  .se-cal-right{
    width:100% !important;
    max-height:220px;
  }
  .se-cal-upcoming{
    width:100% !important;
    border-left:none !important;
    border-top:1px solid rgba(255,255,255,0.06);
  }
  .se-cal-daybtn{
    min-height:32px !important;
    font-size:10px !important;
  }
}

/* Modal: full screen on mobile */
@media(max-width:600px){
  .se-modal-inner{
    margin:0 !important;
    max-width:100% !important;
    max-height:100vh !important;
    height:100vh;
    border-left:none !important;
    border-right:none !important;
  }
  .se-modal-body{
    padding:14px 16px !important;
  }
  .se-modal-footer{
    padding:10px 16px !important;
  }
}

/* Edit form: single col on mobile */
@media(max-width:500px){
  .se-edit-grid{
    grid-template-columns:1fr !important;
  }
  .se-edit-grid > div[style*="span 2"]{
    grid-column:span 1 !important;
  }
  .se-cat-grid{
    grid-template-columns:1fr 1fr !important;
  }
}

/* Profile sections: single col on mobile */
@media(max-width:500px){
  .se-profile-grid{
    grid-template-columns:1fr !important;
  }
}

/* Upcoming banner badge on small screen */
@media(max-width:400px){
  .se-sortbar{
    gap:4px !important;
  }
  .se-sortbar button{
    padding:4px 8px !important;
    font-size:9px !important;
  }
}
</style>
</head>
<body>
<div id="app"></div>

<script>
const MOCK_PEOPLE = [
  {id:'1',name:'ALICE TAN',status:'active',network_category:['CLIENT'],last_interaction:new Date(Date.now()-2*864e5).toISOString(),created_at:new Date(Date.now()-30*864e5).toISOString(),biography:{age:'29',sex:'Female',marital:'Single',currentCar:'Honda City'},family:{hometown:'Penang',currentStay:'KL'},occupation:{occ_position:'Marketing Manager',occ_salary:'7500',occ_education:'Bachelor Marketing'},recreation:{rec_hobby:'Photography, Yoga'},notes:'High potential client. Very responsive.',keyword:['HOT_LEAD','FOLLOW_UP'],interactions:[{log:'[01/05/2025] Called',created_at:new Date(Date.now()-2*864e5).toISOString()},{log:'[28/04/2025] Meet Up',created_at:new Date(Date.now()-5*864e5).toISOString()}],itinerary:[{date:new Date(Date.now()+3*864e5).toISOString().split('T')[0],label:'Follow up on proposal',created_at:new Date().toISOString()}]},
  {id:'2',name:'BRYAN LOW',status:'active',network_category:['BIZ_PARTNER','COLLEAGUE'],last_interaction:new Date(Date.now()-7*864e5).toISOString(),created_at:new Date(Date.now()-60*864e5).toISOString(),biography:{age:'34',sex:'Male',marital:'Married',currentCar:'Toyota Camry'},family:{hometown:'Ipoh',currentStay:'PJ'},occupation:{occ_position:'Business Development Director',occ_salary:'12000',occ_education:'MBA'},recreation:{rec_hobby:'Golf, Reading'},notes:'Strategic partner for the northern region.',keyword:['PARTNER','GOLF'],interactions:[{log:'[25/04/2025] Meet Up',created_at:new Date(Date.now()-7*864e5).toISOString()}],itinerary:[]},
  {id:'3',name:'CHLOE NG',status:'active',network_category:['PROSPECT'],last_interaction:new Date(Date.now()-15*864e5).toISOString(),created_at:new Date(Date.now()-20*864e5).toISOString(),biography:{age:'26',sex:'Female',marital:'Single'},family:{currentStay:'Subang'},occupation:{occ_position:'Nurse',occ_salary:'4200'},notes:'Met at networking event. Interested in side income.',keyword:['NURSE','SIDE_INCOME'],interactions:[{log:'[15/04/2025] Texted',created_at:new Date(Date.now()-15*864e5).toISOString()}],itinerary:[]},
  {id:'4',name:'DAVID CHEN',status:'active',network_category:['SOCIAL'],last_interaction:new Date(Date.now()-25*864e5).toISOString(),created_at:new Date(Date.now()-90*864e5).toISOString(),biography:{age:'31',sex:'Male',marital:'In Relationship'},family:{hometown:'JB',currentStay:'Bangsar'},occupation:{occ_position:'Software Engineer',occ_salary:'9800'},notes:'Old friend from university.',keyword:['TECH','GAMING'],interactions:[],itinerary:[]},
  {id:'5',name:'EMMA WONG',status:'active',network_category:['CLIENT','PROSPECT'],last_interaction:new Date(Date.now()-1*864e5).toISOString(),created_at:new Date(Date.now()-14*864e5).toISOString(),biography:{age:'38',sex:'Female',marital:'Married',currentCar:'BMW 3 Series'},family:{hometown:'KL',currentStay:'Mont Kiara'},occupation:{occ_position:'Financial Planner',occ_salary:'15000'},notes:'Top earner in her firm. Very time-sensitive.',keyword:['VIP','FINANCE'],interactions:[{log:'[02/05/2025] Called',created_at:new Date(Date.now()-1*864e5).toISOString()},{log:'[30/04/2025] Meet Up',created_at:new Date(Date.now()-3*864e5).toISOString()}],itinerary:[{date:new Date(Date.now()+1*864e5).toISOString().split('T')[0],label:'Send product info',created_at:new Date().toISOString()}]},
  {id:'6',name:'FARID AZIZ',status:'active',network_category:['COLLEAGUE'],last_interaction:new Date(Date.now()-40*864e5).toISOString(),created_at:new Date(Date.now()-120*864e5).toISOString(),biography:{age:'27',sex:'Male',marital:'Single'},family:{currentStay:'Ampang'},occupation:{occ_position:'Sales Executive',occ_salary:'4500'},notes:'Team member, needs coaching.',keyword:['TEAM','COACHING'],interactions:[],itinerary:[]},
  {id:'7',name:'GRACE LIM',status:'active',network_category:['FAMILY'],last_interaction:new Date().toISOString(),created_at:new Date(Date.now()-365*864e5).toISOString(),biography:{age:'45',sex:'Female',marital:'Married'},family:{hometown:'Melaka',currentStay:'Melaka'},occupation:{occ_position:'Housewife'},notes:'Sister. Supportive of the business.',keyword:['FAMILY'],interactions:[{log:'[03/05/2025] Called',created_at:new Date().toISOString()}],itinerary:[]},
  {id:'8',name:'HARIS MALIK',status:'archived',archive_reason:'Lost contact for 6 months',archived_at:new Date(Date.now()-30*864e5).toISOString(),created_at:new Date(Date.now()-200*864e5).toISOString(),network_category:['PROSPECT'],biography:{age:'30',sex:'Male'},notes:'Old prospect. No response.',keyword:[],interactions:[],itinerary:[]},
];

const MOCK_EVENTS = [
  {id:'e1',date:new Date(Date.now()+2*864e5).toISOString().split('T')[0],label:'Team Strategy Meeting',category:'BIZ_EVENT',note:'Prepare slides beforehand'},
  {id:'e2',date:new Date(Date.now()+5*864e5).toISOString().split('T')[0],label:'Doctor Appointment',category:'APPOINTMENT',person_id:'1'},
  {id:'e3',date:new Date().toISOString().split('T')[0],label:'Submit monthly report',category:'REMINDER',note:'Email to HQ by EOD'},
  {id:'e4',date:new Date(Date.now()-3*864e5).toISOString().split('T')[0],end_date:new Date(Date.now()+7*864e5).toISOString().split('T')[0],label:'Product Launch Campaign',category:'BIZ_EVENT',note:'Multi-week event'},
];

const NET_CAT = {
  SELF:{label:'Self',color:'#b45309',bg:'rgba(180,83,9,0.12)',dot:'#b45309'},
  FAMILY:{label:'Family',color:'#e11d48',bg:'rgba(225,29,72,0.12)',dot:'#e11d48'},
  CLIENT:{label:'Client',color:'#059669',bg:'rgba(5,150,105,0.12)',dot:'#059669'},
  BIZ_PARTNER:{label:'Biz Partner',color:'#7c3aed',bg:'rgba(124,58,237,0.12)',dot:'#7c3aed'},
  PROSPECT:{label:'Prospect',color:'#d97706',bg:'rgba(217,119,6,0.12)',dot:'#d97706'},
  COLLEAGUE:{label:'Colleague',color:'#0284c7',bg:'rgba(2,132,199,0.12)',dot:'#0284c7'},
  SOCIAL:{label:'Social',color:'#ea580c',bg:'rgba(234,88,12,0.12)',dot:'#ea580c'},
  OTHERS:{label:'Others',color:'#737373',bg:'rgba(115,115,115,0.12)',dot:'#737373'},
};
const CAT_COLORS = {
  PERSONAL:{dot:'#eab308',label:'Personal'},
  BIZ_EVENT:{dot:'#8b5cf6',label:'Biz Event'},
  REMINDER:{dot:'#f97316',label:'Reminder'},
  APPOINTMENT:{dot:'#0ea5e9',label:'Appt'},
};

let state = {
  page:'home',
  people:[...MOCK_PEOPLE.filter(p=>p.status!=='archived')],
  archived:[...MOCK_PEOPLE.filter(p=>p.status==='archived')],
  events:[...MOCK_EVENTS],
  selectedPerson:null,
  modalOpen:false,
  calendarOpen:false,
  calYear:new Date().getFullYear(),
  calMonth:new Date().getMonth(),
  calDate:null,
  searchQ:'',
  catFilter:null,
  sortMode:'RECENT',
  nextId:100,
};

function getHeat(p){
  if(Array.isArray(p.network_category)&&p.network_category.includes('SELF'))return 100;
  const last=new Date(p.last_interaction||p.created_at||Date.now());
  const diff=Math.floor((Date.now()-last.getTime())/(864e5));
  return Math.max(0,Math.round(100-(diff/19)*100));
}
function heatStatus(h){return h>=70?'ACTIVE':h>=30?'WARM':'COLD';}
function heatColor(h){return h>=70?'#22d3ee':h>=30?'#eab308':'#ef4444';}
function toIso(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function todayIso(){return toIso(new Date());}
function parseIso(s){return s?s.split('T')[0]:'';}

function render(){
  const app=document.getElementById('app');
  app.innerHTML='';
  app.appendChild(renderLayout());
}

function renderLayout(){
  const wrap=el('div',{style:'background:#0f0f0f;min-height:100vh;font-family:"Courier New",monospace;'});
  wrap.appendChild(renderNav());
  const main=el('div',{id:'se-main',style:'padding:1.5rem;max-width:1200px;margin:0 auto;'});
  if(state.page==='home')main.appendChild(renderHome());
  else if(state.page==='registry')main.appendChild(renderRegistry());
  else if(state.page==='archived')main.appendChild(renderArchived());
  else if(state.page==='calendar')main.appendChild(renderCalendarPage());
  wrap.appendChild(main);
  if(state.modalOpen&&state.selectedPerson)wrap.appendChild(renderModal());
  if(state.calendarOpen)wrap.appendChild(renderCalendarModal());
  return wrap;
}

function renderNav(){
  const nav=el('nav',{id:'se-nav',style:'border-bottom:1px solid #262626;padding:14px 24px;display:flex;justify-content:space-between;align-items:center;background:#161616;position:sticky;top:0;z-index:50;'});
  const left=el('div',{id:'se-nav-left'});
  left.innerHTML=`<div style="display:flex;align-items:center;gap:8px;"><div style="width:10px;height:10px;background:#22c55e;border-radius:50%;"></div><span style="color:#d4d4d4;font-size:12px;letter-spacing:0.1em;">SYSTEM_ACTIVE</span></div><div style="color:#737373;font-size:11px;margin-top:2px;letter-spacing:0.1em;">OPERATOR_ID: <span style="color:#eab308;">DEMO_USER</span></div>`;
  const links=el('div',{id:'se-nav-links',style:'display:flex;gap:20px;align-items:center;'});
  ['home','registry','calendar'].forEach(pg=>{
    const isActive=state.page===pg||(pg==='registry'&&state.page==='archived');
    const lnk=el('button',{style:`background:none;border:none;color:${isActive?'#eab308':'#a3a3a3'};font-size:12px;font-family:inherit;letter-spacing:0.15em;text-transform:uppercase;padding:4px 8px;border-bottom:${isActive?'1px solid #eab308':'1px solid transparent'};`},pg==='registry'?'Database':pg.charAt(0).toUpperCase()+pg.slice(1));
    lnk.onclick=()=>{state.page=pg==='registry'?'registry':pg;state.searchQ='';state.catFilter=null;render();};
    links.appendChild(lnk);
  });
  const dbtn=el('button',{style:'background:none;border:1px solid #333;color:#737373;font-size:11px;font-family:inherit;letter-spacing:0.1em;padding:6px 12px;'},`DEMO_MODE`);
  links.appendChild(dbtn);
  nav.appendChild(left);nav.appendChild(links);
  return nav;
}

function renderHome(){
  const div=el('div',{});
  const active=state.people.filter(p=>p.status!=='archived');

  const hdr=el('div',{style:'border-bottom:2px solid #3d3d3d;padding-bottom:20px;margin-bottom:24px;display:flex;justify-content:space-between;align-items:flex-end;'});
  hdr.innerHTML=`<div><h1 style="color:#eab308;font-size:18px;letter-spacing:0.2em;text-transform:uppercase;">⚙ Social_Engine.exe</h1><p style="color:#737373;font-size:11px;margin-top:4px;letter-spacing:0.1em;text-transform:uppercase;">Units_Detected: ${active.length}</p></div>`;
  const calBtn=el('button',{style:'background:#171717;border:1px solid #333;color:#d4d4d4;font-size:11px;font-family:inherit;letter-spacing:0.15em;text-transform:uppercase;padding:6px 12px;position:relative;'},'Schedule');
  const upcoming=state.events.filter(e=>parseIso(e.date)>=todayIso()).length;
  if(upcoming>0){
    const badge=el('span',{style:'position:absolute;top:-6px;right:-6px;background:#eab308;color:#000;font-size:9px;font-weight:900;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;'},upcoming>9?'9+':String(upcoming));
    calBtn.appendChild(badge);
  }
  calBtn.onclick=()=>{state.calendarOpen=true;render();};
  hdr.querySelector('div').insertAdjacentElement('afterend',calBtn);
  div.appendChild(hdr);

  const bar=el('div',{class:'se-sortbar',style:'display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center;'});
  ['RECENT','DECAY'].forEach(m=>{
    const b=el('button',{style:`background:${state.sortMode===m?'rgba(234,179,8,0.1)':'rgba(255,255,255,0.02)'};border:1px solid ${state.sortMode===m?'rgba(234,179,8,0.4)':'rgba(255,255,255,0.05)'};color:${state.sortMode===m?'#eab308':'#737373'};font-size:10px;font-family:inherit;letter-spacing:0.15em;text-transform:uppercase;padding:5px 12px;`},m==='RECENT'?'01_RECENT':'02_DECAY');
    b.onclick=()=>{state.sortMode=m;render();};
    bar.appendChild(b);
  });
  div.appendChild(bar);

  const srch=el('div',{style:'position:relative;margin-bottom:10px;'});
  const si=el('input',{type:'text',placeholder:'Search name, position, keyword...',style:'width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.05);color:#fff;font-family:inherit;font-size:12px;padding:8px 12px 8px 32px;outline:none;'});
  si.value=state.searchQ;
  si.oninput=e=>{
    state.searchQ=e.target.value;
    render();
    const newSi=document.querySelector('input[placeholder^="Search name"]');
    if(newSi){newSi.focus();newSi.setSelectionRange(newSi.value.length,newSi.value.length);}
  };
  srch.innerHTML=`<span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#525252;font-size:12px;">🔍</span>`;
  srch.appendChild(si);
  div.appendChild(srch);

  const chips=el('div',{style:'display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;'});
  const allBtn=el('button',{style:`background:${!state.catFilter?'rgba(234,179,8,0.1)':'transparent'};border:1px solid ${!state.catFilter?'rgba(234,179,8,0.3)':'rgba(255,255,255,0.05)'};color:${!state.catFilter?'#eab308':'#525252'};font-size:9px;font-family:inherit;letter-spacing:0.1em;text-transform:uppercase;padding:4px 8px;`},`All ${active.length}`);
  allBtn.onclick=()=>{state.catFilter=null;render();};
  chips.appendChild(allBtn);
  Object.entries(NET_CAT).forEach(([k,v])=>{
    const cnt=active.filter(p=>(Array.isArray(p.network_category)?p.network_category:[p.network_category||'OTHERS']).includes(k)).length;
    if(!cnt)return;
    const isA=state.catFilter===k;
    const b=el('button',{style:`background:${isA?v.bg:'transparent'};border:1px solid ${isA?v.color+'66':'rgba(255,255,255,0.05)'};color:${isA?v.color:'#525252'};font-size:9px;font-family:inherit;letter-spacing:0.1em;text-transform:uppercase;padding:4px 8px;display:flex;align-items:center;gap:4px;`});
    b.innerHTML=`<span style="width:6px;height:6px;border-radius:50%;background:${isA?v.dot:'#525252'};display:inline-block;"></span>${v.label} ${cnt}`;
    b.onclick=()=>{state.catFilter=state.catFilter===k?null:k;render();};
    chips.appendChild(b);
  });
  div.appendChild(chips);

  let filtered=active.filter(p=>{
    if(state.catFilter){const cats=Array.isArray(p.network_category)?p.network_category:[p.network_category||'OTHERS'];if(!cats.includes(state.catFilter))return false;}
    if(state.searchQ){const q=state.searchQ.toLowerCase();return JSON.stringify(p).toLowerCase().includes(q);}
    return true;
  });
  if(state.sortMode==='RECENT')filtered.sort((a,b)=>new Date(b.last_interaction||b.created_at).getTime()-new Date(a.last_interaction||a.created_at).getTime());
  else filtered.sort((a,b)=>getHeat(a)-getHeat(b));

  const grid=el('div',{class:'se-card-grid',style:'display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;'});
  filtered.forEach(p=>{
    const h=getHeat(p);const hs=heatStatus(h);const hc=heatColor(h);
    const card=el('div',{style:'position:relative;aspect-ratio:1;background:#16191d;border:1px solid rgba(255,255,255,0.08);overflow:hidden;cursor:pointer;transition:border-color 0.2s;'});
    card.onmouseover=()=>card.style.borderColor='#eab308';
    card.onmouseout=()=>card.style.borderColor='rgba(255,255,255,0.08)';
    card.innerHTML=`
      <div style="position:absolute;top:6px;right:6px;font-size:8px;color:${hc};font-weight:900;letter-spacing:0.05em;">${hs}</div>
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;color:rgba(255,255,255,0.04);font-style:italic;">${p.name.substring(0,4)}</div>
      <div style="position:absolute;bottom:0;left:0;right:0;background:#1e2227;border-top:1px solid rgba(255,255,255,0.05);">
        <div style="height:2px;background:#333;"><div style="height:100%;width:${h}%;background:${h<30?'#ef4444':'#eab308'};"></div></div>
        <div style="padding:6px 8px;"><div style="font-size:10px;font-weight:900;color:#d4d4d4;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.name}</div></div>
      </div>`;
    card.onclick=()=>{state.selectedPerson=p;state.modalOpen=true;render();};
    grid.appendChild(card);
  });
  const add=el('div',{style:'aspect-ratio:1;border:2px dashed #3d3d3d;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;min-height:100px;'});
  add.innerHTML=`<span style="font-size:20px;color:#525252;">+</span><span style="font-size:9px;color:#525252;letter-spacing:0.15em;text-transform:uppercase;">Empty Slot</span>`;
  add.onclick=()=>{const n=prompt('Enter name:');if(n&&n.trim()){const np={id:String(++state.nextId),name:n.trim().toUpperCase(),status:'active',network_category:['OTHERS'],created_at:new Date().toISOString(),last_interaction:new Date().toISOString(),biography:{},family:{},occupation:{},notes:'',keyword:[],interactions:[],itinerary:[]};state.people.push(np);render();}};
  grid.appendChild(add);
  div.appendChild(grid);

  const viewAll=el('div',{style:'margin-top:16px;display:flex;justify-content:flex-end;'});
  const va=el('button',{style:'background:transparent;border:1px solid rgba(255,255,255,0.05);color:#525252;font-size:10px;font-family:inherit;letter-spacing:0.2em;text-transform:uppercase;padding:6px 14px;'},'View All Active Units →');
  va.onclick=()=>{state.page='registry';render();};
  viewAll.appendChild(va);div.appendChild(viewAll);
  return div;
}

function renderRegistry(){
  const div=el('div',{});
  const active=state.people.filter(p=>p.status!=='archived');

  const hdr=el('div',{style:'margin-bottom:24px;border-left:4px solid #22d3ee;padding-left:20px;'});
  hdr.innerHTML=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;"><span style="color:#22d3ee;font-size:18px;">⚡</span><h1 style="color:#fff;font-size:28px;font-weight:900;text-transform:uppercase;font-style:italic;letter-spacing:-0.02em;">Active_<span style="color:#22d3ee;">Registry</span></h1></div><p style="color:#737373;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;">Monitoring Social Decay // Real-time Feed</p>`;
  const countBox=el('div',{style:'background:#000;border:1px solid rgba(255,255,255,0.08);padding:12px 16px;text-align:right;margin-top:8px;display:inline-block;min-width:120px;'});
  countBox.innerHTML=`<div style="font-size:9px;color:#525252;letter-spacing:0.2em;text-transform:uppercase;margin-bottom:4px;">Unit_Count</div><div style="font-size:36px;font-weight:900;color:#22d3ee;line-height:1;">${String(active.length).padStart(3,'0')}</div>`;
  hdr.appendChild(countBox);
  div.appendChild(hdr);

  const si=el('input',{type:'text',placeholder:'Search...',style:'width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.05);color:#fff;font-family:inherit;font-size:12px;padding:8px 12px;outline:none;margin-bottom:16px;'});
  si.value=state.searchQ;
  si.oninput=e=>{
    state.searchQ=e.target.value;
    render();
    const newSi=document.querySelector('input[placeholder="Search..."]');
    if(newSi){newSi.focus();newSi.setSelectionRange(newSi.value.length,newSi.value.length);}
  };
  div.appendChild(si);

  const addBtn=el('button',{style:'background:#22d3ee;color:#000;border:none;font-size:11px;font-family:inherit;letter-spacing:0.2em;text-transform:uppercase;padding:8px 16px;margin-bottom:20px;font-weight:900;'},'+ Register_New_Unit');
  addBtn.onclick=()=>{state.selectedPerson=null;state.modalOpen=true;render();};
  div.appendChild(addBtn);

  let filtered=active.filter(p=>{
    if(!state.searchQ)return true;
    const q=state.searchQ.toLowerCase();
    return JSON.stringify(p).toLowerCase().includes(q);
  });

  const list=el('div',{style:'display:flex;flex-direction:column;gap:6px;'});
  filtered.forEach(p=>{
    const h=getHeat(p);const hs=heatStatus(h);const hc=heatColor(h);
    const row=el('div',{class:'se-registry-row',style:'background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;cursor:pointer;transition:border-color 0.2s;'});
    row.onmouseover=()=>row.style.borderColor='rgba(34,211,238,0.3)';
    row.onmouseout=()=>row.style.borderColor='rgba(255,255,255,0.05)';

    const info=el('div',{class:'se-registry-info',style:'flex:1;padding:10px 16px;display:flex;align-items:center;gap:12px;'});
    info.innerHTML=`<div style="width:8px;height:8px;border-radius:50%;background:${hc};flex-shrink:0;"></div><div style="flex:1;min-width:0;"><span style="font-size:13px;font-weight:900;color:#fff;text-transform:uppercase;margin-right:8px;">${p.name}</span><span style="font-size:10px;color:#525252;">${p.occupation?.occ_position||''}</span></div>`;

    const bar=el('div',{class:'se-registry-bar',style:'width:140px;padding:0 12px;display:flex;align-items:center;gap:8px;'});
    bar.innerHTML=`<span style="font-size:9px;font-weight:900;color:${hc};text-transform:uppercase;white-space:nowrap;">${hs}</span><div style="flex:1;height:4px;background:#2a2a2a;border-radius:2px;"><div style="height:100%;width:${h}%;background:${hc};border-radius:2px;"></div></div><span style="font-size:10px;color:${hc};font-family:'Courier New';min-width:32px;">${h}%</span>`;

    const dateArea=el('div',{class:'se-registry-date',style:'width:120px;padding:0 16px;text-align:right;'});
    const last=p.last_interaction?new Date(p.last_interaction):new Date(p.created_at);
    dateArea.innerHTML=`<div style="font-size:8px;color:#525252;text-transform:uppercase;letter-spacing:0.1em;">Last</div><div style="font-size:11px;color:#d4d4d4;font-family:'Courier New';">${last.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'2-digit'}).toUpperCase()}</div>`;

    const archBtn=el('button',{class:'se-registry-archbtn',style:'background:rgba(239,68,68,0.08);border:none;border-left:1px solid rgba(255,255,255,0.05);color:#ef4444;padding:0 14px;height:44px;font-size:14px;font-family:inherit;transition:background 0.2s;'},'🗄');
    archBtn.title='Archive';
    archBtn.onmouseover=()=>archBtn.style.background='rgba(239,68,68,0.2)';
    archBtn.onmouseout=()=>archBtn.style.background='rgba(239,68,68,0.08)';
    archBtn.onclick=e=>{e.stopPropagation();const r=prompt(`Archive ${p.name}? Reason:`,`Unit_Idle // Lost Contact`);if(r!==null){p.status='archived';p.archive_reason=r;p.archived_at=new Date().toISOString();state.archived.push(p);state.people=state.people.filter(x=>x.id!==p.id);render();}};

    info.onclick=()=>{state.selectedPerson=p;state.modalOpen=true;render();};
    row.appendChild(info);row.appendChild(bar);row.appendChild(dateArea);row.appendChild(archBtn);
    list.appendChild(row);
  });

  if(!filtered.length){
    const empty=el('div',{style:'padding:48px;text-align:center;border:2px dashed #1a1a1a;'});
    empty.innerHTML=`<div style="color:#525252;font-size:10px;letter-spacing:0.3em;text-transform:uppercase;">No_Matches_Found</div>`;
    list.appendChild(empty);
  }
  div.appendChild(list);

  const archLink=el('div',{style:'margin-top:20px;'});
  const al=el('button',{style:'background:transparent;border:none;color:#525252;font-size:10px;font-family:inherit;letter-spacing:0.2em;text-transform:uppercase;'},'→ Archive_Vault ('+state.archived.length+')');
  al.onclick=()=>{state.page='archived';render();};
  archLink.appendChild(al);div.appendChild(archLink);
  return div;
}

function renderArchived(){
  const div=el('div',{});
  const hdr=el('div',{style:'margin-bottom:24px;border-left:4px solid #ef4444;padding-left:20px;'});
  hdr.innerHTML=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;"><h1 style="color:#fff;font-size:28px;font-weight:900;text-transform:uppercase;font-style:italic;">Archive_<span style="color:#ef4444;">Vault</span></h1></div><p style="color:#737373;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;">Dormant Data Segments // Zero-Sum Buffer</p>`;
  div.appendChild(hdr);

  const back=el('button',{style:'background:transparent;border:none;color:#737373;font-size:10px;font-family:inherit;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:16px;'},'← Back to Registry');
  back.onclick=()=>{state.page='registry';render();};
  div.appendChild(back);

  const list=el('div',{style:'display:flex;flex-direction:column;gap:8px;'});
  state.archived.forEach(p=>{
    const row=el('div',{style:'background:rgba(239,68,68,0.04);border:1px solid rgba(239,68,68,0.15);display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;flex-wrap:wrap;'});
    row.onclick=()=>{state.selectedPerson=p;state.modalOpen=true;render();};
    row.innerHTML=`<div style="width:8px;height:8px;border-radius:50%;background:#ef4444;flex-shrink:0;"></div><div style="flex:1;min-width:160px;"><div style="font-size:13px;font-weight:900;color:#fff;text-transform:uppercase;">${p.name}</div><div style="font-size:10px;color:#ef4444;margin-top:2px;font-style:italic;">"${p.archive_reason||'No reason'}"</div></div><div style="font-size:10px;color:#525252;">${p.archived_at?new Date(p.archived_at).toLocaleDateString('en-GB'):''}</div>`;

    const restoreBtn=el('button',{style:'background:rgba(34,211,238,0.08);border:1px solid rgba(34,211,238,0.2);color:#22d3ee;font-size:11px;font-family:inherit;padding:4px 10px;margin-right:4px;'},'Restore');
    restoreBtn.onclick=e=>{e.stopPropagation();p.status='active';delete p.archived_at;delete p.archive_reason;state.people.push(p);state.archived=state.archived.filter(x=>x.id!==p.id);render();};

    const delBtn=el('button',{style:'background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);color:#ef4444;font-size:11px;font-family:inherit;padding:4px 10px;'},'Purge');
    delBtn.onclick=e=>{e.stopPropagation();if(confirm(`Permanently delete ${p.name}?`)){state.archived=state.archived.filter(x=>x.id!==p.id);render();}};

    row.appendChild(restoreBtn);row.appendChild(delBtn);
    list.appendChild(row);
  });

  if(!state.archived.length){
    const empty=el('div',{style:'padding:48px;text-align:center;border:2px dashed #1a1a1a;'});
    empty.innerHTML=`<div style="color:#525252;font-size:10px;letter-spacing:0.3em;text-transform:uppercase;">No_Archived_Units</div>`;
    list.appendChild(empty);
  }
  div.appendChild(list);
  return div;
}

function renderCalendarPage(){
  const div=el('div',{style:'font-family:"Courier New",monospace;'});
  const hdr=el('div',{style:'border-bottom:2px solid #3d3d3d;padding-bottom:20px;margin-bottom:24px;'});
  hdr.innerHTML=`<h1 style="color:#eab308;font-size:18px;letter-spacing:0.2em;text-transform:uppercase;">📅 Command_Calendar.exe</h1><p style="color:#737373;font-size:11px;margin-top:4px;letter-spacing:0.1em;text-transform:uppercase;">Manage events, appointments, and follow-ups</p>`;
  div.appendChild(hdr);
  div.appendChild(renderFullCalendar());
  return div;

function renderFullCalendar(){
  const today=new Date();
  const year=state.calYear||today.getFullYear();
  const month=state.calMonth!=null?state.calMonth:today.getMonth();
  const selDate=state.calDate;

  const wrap=el('div',{class:'se-cal-wrap',style:'display:flex;gap:0;border:1px solid rgba(255,255,255,0.1);background:#0a0a0a;border-radius:4px;overflow:hidden;min-height:500px;'});

  const left=el('div',{class:'se-cal-left',style:'flex:1;display:flex;flex-direction:column;border-right:1px solid rgba(255,255,255,0.08);'});
  const nav=el('div',{style:'display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.06);background:rgba(0,0,0,0.3);'});
  const pb=el('button',{style:'background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:#d4d4d4;width:28px;height:28px;font-size:14px;'},'‹');
  pb.onclick=()=>{if(month===0){state.calYear=year-1;state.calMonth=11;}else state.calMonth=month-1;state.calDate=null;render();};
  const nb=el('button',{style:'background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:#d4d4d4;width:28px;height:28px;font-size:14px;'},'›');
  nb.onclick=()=>{if(month===11){state.calYear=year+1;state.calMonth=0;}else state.calMonth=month+1;state.calDate=null;render();};
  const monthLabel=el('span',{style:'flex:1;text-align:center;font-size:14px;font-weight:900;color:#fff;letter-spacing:0.2em;text-transform:uppercase;'},`${['January','February','March','April','May','June','July','August','September','October','November','December'][month]} `);
  const yr=el('span',{style:'color:#eab308;'},String(year));
  monthLabel.appendChild(yr);
  const todayBtn=el('button',{style:'background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);color:#d4d4d4;font-size:10px;font-family:inherit;letter-spacing:0.1em;padding:4px 10px;'},'Today');
  todayBtn.onclick=()=>{state.calYear=today.getFullYear();state.calMonth=today.getMonth();state.calDate=todayIso();render();};
  nav.appendChild(pb);nav.appendChild(monthLabel);nav.appendChild(nb);nav.appendChild(todayBtn);
  left.appendChild(nav);

  const grid=el('div',{style:'padding:12px;'});
  const days=el('div',{style:'display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:6px;'});
  ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(d=>{
    const dd=el('div',{style:'text-align:center;font-size:9px;font-weight:900;color:#525252;letter-spacing:0.1em;text-transform:uppercase;padding:4px;'},d);
    days.appendChild(dd);
  });
  grid.appendChild(days);

  const dayMap={};
  state.events.forEach(e=>{
    const s=parseIso(e.date);
    const en=e.end_date?parseIso(e.end_date):s;
    const cur=new Date(s+'T00:00:00');
    const end=new Date(en+'T00:00:00');
    while(cur<=end){
      const k=toIso(cur);
      if(!dayMap[k])dayMap[k]=[];
      dayMap[k].push(e);
      cur.setDate(cur.getDate()+1);
    }
  });

  const daysInMonth=[];
  const d=new Date(year,month,1);
  while(d.getMonth()===month){daysInMonth.push(new Date(d));d.setDate(d.getDate()+1);}
  const firstDow=(daysInMonth[0].getDay()+6)%7;

  const dGrid=el('div',{style:'display:grid;grid-template-columns:repeat(7,1fr);gap:2px;'});
  for(let i=0;i<firstDow;i++)dGrid.appendChild(el('div',{}));

  daysInMonth.forEach(day=>{
    const k=toIso(day);
    const isToday=k===todayIso();
    const isSel=k===selDate;
    const evts=dayMap[k]||[];
    const btn=el('button',{class:'se-cal-daybtn',style:`background:${isSel?'rgba(234,179,8,0.1)':'rgba(255,255,255,0.02)'};border:1px solid ${isSel?'#eab308':isToday?'rgba(234,179,8,0.2)':'rgba(255,255,255,0.04)'};color:${isSel?'#eab308':isToday?'#fde68a':'#a3a3a3'};font-family:inherit;font-size:11px;font-weight:900;padding:4px;min-height:40px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;cursor:pointer;position:relative;`},String(day.getDate()));
    if(isToday){const bar=el('div',{style:'position:absolute;top:0;left:0;right:0;height:2px;background:#eab308;'});btn.appendChild(bar);}
    if(evts.length){
      const dots=el('div',{style:'display:flex;gap:2px;margin-top:2px;flex-wrap:wrap;justify-content:center;'});
      evts.slice(0,3).forEach(e=>{
        const c=CAT_COLORS[e.category];
        const dot=el('span',{style:`width:5px;height:5px;border-radius:50%;background:${isSel?'rgba(0,0,0,0.5)':c?c.dot:'#737373'};display:inline-block;`});
        dots.appendChild(dot);
      });
      btn.appendChild(dots);
    }
    btn.onclick=()=>{state.calDate=state.calDate===k?null:k;render();};
    dGrid.appendChild(btn);
  });
  grid.appendChild(dGrid);
  left.appendChild(grid);

  if(selDate){
    const addForm=el('div',{style:'margin:0 12px 12px;padding:12px;background:rgba(234,179,8,0.03);border:1px solid rgba(234,179,8,0.1);'});
    addForm.innerHTML=`<div style="font-size:10px;font-weight:900;color:#eab308;letter-spacing:0.2em;text-transform:uppercase;margin-bottom:8px;">Add Event</div>`;
    const cats=el('div',{style:'display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;'});
    let tmpCat='PERSONAL';
    Object.entries(CAT_COLORS).forEach(([k,v])=>{
      const b=el('button',{style:`background:transparent;border:1px solid rgba(255,255,255,0.1);color:#737373;font-size:9px;font-family:inherit;letter-spacing:0.1em;text-transform:uppercase;padding:3px 8px;transition:all 0.1s;`,id:`cat-${k}`},v.label);
      b.onclick=()=>{tmpCat=k;document.querySelectorAll('[id^="cat-"]').forEach(x=>x.style.background='transparent');b.style.background=v.dot+'33';b.style.color=v.dot;b.style.borderColor=v.dot+'66';};
      cats.appendChild(b);
    });
    addForm.appendChild(cats);
    const row=el('div',{style:'display:flex;gap:6px;'});
    const inp=el('input',{type:'text',placeholder:'Event title...',style:'flex:1;background:#111;border:1px solid #333;color:#fff;font-family:inherit;font-size:12px;padding:7px 10px;outline:none;'});
    const saveBtn=el('button',{style:'background:#eab308;color:#000;border:none;font-size:10px;font-family:inherit;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;padding:0 14px;'},'Save');
    saveBtn.onclick=()=>{
      if(!inp.value.trim())return;
      const ne={id:'e'+Date.now(),date:selDate,label:inp.value.trim(),category:tmpCat,note:''};
      state.events.push(ne);inp.value='';render();
    };
    inp.onkeydown=e=>{if(e.key==='Enter')saveBtn.click();};
    row.appendChild(inp);row.appendChild(saveBtn);
    addForm.appendChild(row);
    left.appendChild(addForm);
  }

  wrap.appendChild(left);

  const right=el('div',{class:'se-cal-right',style:'width:280px;display:flex;flex-direction:column;background:#0d0d0d;'});
  if(selDate){
    const dayEvts=dayMap[selDate]||[];
    const dayHdr=el('div',{style:'padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.06);background:rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;'});
    const dd=new Date(selDate+'T12:00:00');
    dayHdr.innerHTML=`<span style="font-size:12px;font-weight:900;color:#eab308;letter-spacing:0.1em;text-transform:uppercase;">${dd.toLocaleDateString('en-MY',{weekday:'short',day:'2-digit',month:'short'})}</span>${dayEvts.length?`<span style="background:#eab308;color:#000;font-size:9px;font-weight:900;padding:2px 6px;">${dayEvts.length}</span>`:''}`;
    right.appendChild(dayHdr);

    const evtList=el('div',{style:'flex:1;overflow-y:auto;',class:'no-sb'});
    if(!dayEvts.length){
      evtList.innerHTML=`<div style="padding:32px;text-align:center;color:#525252;font-size:11px;text-transform:uppercase;letter-spacing:0.15em;">Nothing scheduled</div>`;
    }else{
      dayEvts.forEach(ev=>{
        const c=CAT_COLORS[ev.category]||{dot:'#737373'};
        const erow=el('div',{style:'padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.04);display:flex;align-items:flex-start;gap:10px;'});
        erow.innerHTML=`<span style="width:8px;height:8px;border-radius:50%;background:${c.dot};flex-shrink:0;margin-top:4px;"></span><div style="flex:1;min-width:0;"><div style="font-size:13px;font-weight:900;color:#fff;">${ev.label}</div>${ev.note?`<div style="font-size:11px;color:#737373;margin-top:3px;">${ev.note}</div>`:''}</div>`;
        const del=el('button',{style:'background:none;border:none;color:#525252;font-size:12px;padding:2px 4px;cursor:pointer;flex-shrink:0;'},'✕');
        del.onclick=()=>{state.events=state.events.filter(x=>x.id!==ev.id);render();};
        erow.appendChild(del);
        evtList.appendChild(erow);
      });
    }
    right.appendChild(evtList);
  }else{
    right.innerHTML=`<div style="flex:1;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center;"><p style="font-size:12px;font-weight:900;color:#525252;text-transform:uppercase;letter-spacing:0.15em;">Select a date<br>to view itinerary</p></div>`;
  }
  wrap.appendChild(right);

  const upcoming=el('div',{class:'se-cal-upcoming',style:'width:240px;display:flex;flex-direction:column;background:rgba(0,0,0,0.2);border-left:1px solid rgba(255,255,255,0.06);'});
  const upHdr=el('div',{style:'padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.06);font-size:11px;font-weight:900;color:#d4d4d4;letter-spacing:0.15em;text-transform:uppercase;flex-shrink:0;'});
  upHdr.innerHTML=`⏰ Upcoming`;
  upcoming.appendChild(upHdr);

  const upList=el('div',{style:'flex:1;overflow-y:auto;padding:8px;',class:'no-sb'});
  const upEvents=state.events.filter(e=>parseIso(e.date)>=todayIso()).sort((a,b)=>parseIso(a.date).localeCompare(parseIso(b.date)));
  if(!upEvents.length){
    upList.innerHTML=`<div style="padding:24px;text-align:center;color:#525252;font-size:11px;text-transform:uppercase;letter-spacing:0.1em;">No upcoming events</div>`;
  }else{
    upEvents.forEach(ev=>{
      const c=CAT_COLORS[ev.category]||{dot:'#737373',label:ev.category};
      const item=el('div',{style:'padding:10px;border-bottom:1px solid rgba(255,255,255,0.03);'});
      const d=new Date(parseIso(ev.date)+'T12:00:00');
      item.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;"><span style="font-size:10px;color:#737373;">${d.toLocaleDateString('en-MY',{month:'short',day:'2-digit',weekday:'short'})}</span><span style="font-size:9px;background:${c.dot}33;color:${c.dot};padding:2px 6px;">${c.label}</span></div><div style="font-size:12px;font-weight:900;color:#fff;">${ev.label}</div>`;
      upList.appendChild(item);
    });
  }
  upcoming.appendChild(upList);
  wrap.appendChild(upcoming);
  return wrap;
}

  const modal=el('div',{style:'position:relative;width:100%;max-width:900px;max-height:92vh;background:#0d0d0d;border:1px solid rgba(255,255,255,0.15);display:flex;flex-direction:column;overflow:hidden;'});
  const topBar=el('div',{style:'height:3px;background:#eab308;flex-shrink:0;'});

  const hdr=el('div',{style:'display:flex;align-items:center;justify-content:space-between;padding:12px 24px;border-bottom:1px solid rgba(255,255,255,0.08);flex-shrink:0;background:rgba(0,0,0,0.5);'});
  hdr.innerHTML=`<div style="display:flex;align-items:center;gap:10px;"><span style="color:#eab308;font-size:14px;">📅</span><span style="font-size:13px;font-weight:900;color:#fff;letter-spacing:0.2em;text-transform:uppercase;">Schedule</span></div>`;
  const cls=el('button',{style:'background:none;border:none;color:#737373;font-size:18px;cursor:pointer;padding:4px 8px;'},'✕');
  cls.onclick=()=>{state.calendarOpen=false;render();};
  hdr.appendChild(cls);
  modal.appendChild(hdr);

  const body=el('div',{style:'flex:1;overflow-y:auto;padding:16px;',class:'no-sb'});
  body.appendChild(renderFullCalendar());
  modal.appendChild(body);
  overlay.appendChild(modal);
  return overlay;
}

function renderModal(){
  const p=state.selectedPerson;
  const h=getHeat(p);
  const isArchived=p.status==='archived';
  const isNew=!p.id||state.people.find(x=>x.id===p.id)===undefined&&!isArchived;

  const overlay=el('div',{style:'position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:0;'});
  const bg=el('div',{style:'position:absolute;inset:0;background:rgba(0,0,0,0.95);'});
  bg.onclick=()=>{state.modalOpen=false;state.selectedPerson=null;render();};
  overlay.appendChild(bg);

  const modal=el('div',{class:'se-modal-inner',style:'position:relative;width:100%;max-width:680px;max-height:92vh;background:#0a0a0a;border:1px solid rgba(255,255,255,0.1);display:flex;flex-direction:column;overflow:hidden;margin:16px;'});
  const tb=el('div',{style:'height:3px;background:#eab308;flex-shrink:0;'});
  modal.appendChild(tb);

  const hdr=el('div',{style:'padding:16px 24px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:rgba(10,10,10,0.98);'});
  const htitle=el('div',{});
  htitle.innerHTML=`<h2 style="font-size:15px;font-weight:900;color:#fff;text-transform:uppercase;letter-spacing:0.05em;">⚠ ${p.name||'New Unit'}</h2>`;
  if(!isNew&&!isArchived){
    htitle.innerHTML+=`<div style="display:flex;align-items:center;gap:8px;margin-top:6px;"><div style="width:80px;height:4px;background:#1a1a1a;border-radius:2px;"><div style="height:100%;width:${h}%;background:${heatColor(h)};border-radius:2px;transition:width 0.5s;"></div></div><span style="font-size:10px;font-weight:900;color:${heatColor(h)};text-transform:uppercase;">${heatStatus(h)} ${h}%</span></div>`;
  }

  const hbtns=el('div',{style:'display:flex;align-items:center;gap:8px;'});
  const cls=el('button',{style:'background:none;border:none;color:#737373;font-size:18px;cursor:pointer;padding:4px 8px;'},'✕');
  cls.onclick=()=>{state.modalOpen=false;state.selectedPerson=null;render();};
  hbtns.appendChild(cls);
  hdr.appendChild(htitle);hdr.appendChild(hbtns);modal.appendChild(hdr);

  const body=el('div',{class:'se-modal-body',style:'flex:1;overflow-y:auto;padding:20px 24px;',class:'no-sb'});

  if(isNew||state.editMode){
    body.appendChild(renderEditForm(p,isNew));
  }else{
    const qa=el('div',{style:'margin-bottom:16px;border:1px solid rgba(255,255,255,0.06);background:#0d0d0d;border-radius:2px;overflow:hidden;'});
    const qaHdr=el('div',{style:'padding:8px 12px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:6px;'});
    qaHdr.innerHTML=`<span style="color:#eab308;font-size:10px;">⚡</span><span style="font-size:10px;font-weight:900;color:rgba(234,179,8,0.7);letter-spacing:0.2em;text-transform:uppercase;">Interaction Log</span>`;
    qa.appendChild(qaHdr);
    const chips=el('div',{style:'display:flex;flex-wrap:wrap;gap:6px;padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.06);'});
    [['Texted','💬','#3b82f6'],['Called','📞','#22c55e'],['Meet Up','👥','#8b5cf6'],['Appointment Made','✅','#eab308']].forEach(([label,icon,color])=>{
      const b=el('button',{style:`display:flex;align-items:center;gap:6px;padding:5px 10px;background:#1e2227;border:1px solid rgba(255,255,255,0.05);border-radius:20px;color:#d4d4d4;font-size:10px;font-family:inherit;letter-spacing:0.05em;text-transform:uppercase;`},`${icon} ${label}`);
      b.onclick=()=>{
        const ts=new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'2-digit',year:'numeric'});
        const log={log:`[${ts}] ${label}`,created_at:new Date().toISOString()};
        if(!p.interactions)p.interactions=[];
        p.interactions.push(log);
        p.last_interaction=new Date().toISOString();
        render();
      };
      chips.appendChild(b);
    });
    qa.appendChild(chips);

    const logs=el('div',{style:'max-height:120px;overflow-y:auto;font-family:"Courier New",monospace;',class:'no-sb'});
    const recent=[...(p.interactions||[])].reverse().slice(0,5);
    if(!recent.length){logs.innerHTML=`<div style="padding:10px 12px;color:#525252;font-size:11px;text-align:center;">No interactions yet</div>`;}
    else{recent.forEach(it=>{const lr=el('div',{style:'padding:6px 12px;border-bottom:1px solid rgba(255,255,255,0.03);font-size:11px;color:#d4d4d4;'});lr.textContent=it.log;logs.appendChild(lr);});}
    qa.appendChild(logs);
    body.appendChild(qa);

    const fs=el('div',{style:'margin-bottom:16px;border:1px solid rgba(255,255,255,0.06);background:#0d0d0d;border-radius:2px;overflow:hidden;'});
    const fsHdr=el('div',{style:'padding:8px 12px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:space-between;'});
    fsHdr.innerHTML=`<div style="display:flex;align-items:center;gap:6px;"><span style="color:#eab308;font-size:10px;">📅</span><span style="font-size:10px;font-weight:900;color:rgba(234,179,8,0.7);letter-spacing:0.2em;text-transform:uppercase;">Upcoming 14D</span>${(p.itinerary||[]).length?`<span style="background:#2a2a2a;color:#d4d4d4;font-size:9px;padding:1px 6px;">${p.itinerary.length}</span>`:''}</div>`;
    const addFuBtn=el('button',{style:'background:none;border:none;color:#737373;font-size:10px;font-family:inherit;cursor:pointer;'},'+ Schedule');
    addFuBtn.onclick=()=>{
      const d=prompt('Date (YYYY-MM-DD):',new Date(Date.now()+2*864e5).toISOString().split('T')[0]);
      const l=prompt('What\'s the plan?');
      if(d&&l){if(!p.itinerary)p.itinerary=[];p.itinerary.push({date:d,label:l,created_at:new Date().toISOString()});render();}
    };
    fsHdr.appendChild(addFuBtn);
    fs.appendChild(fsHdr);

    const fuList=el('div',{style:'max-height:120px;overflow-y:auto;',class:'no-sb'});
    const upcoming=(p.itinerary||[]).filter(e=>e.date>=todayIso()).sort((a,b)=>a.date.localeCompare(b.date));
    if(!upcoming.length){fuList.innerHTML=`<div style="padding:10px 12px;color:#525252;font-size:11px;text-align:center;">Nothing scheduled in the next 14 days</div>`;}
    else{upcoming.forEach((it)=>{const fr=el('div',{style:'padding:8px 12px;border-bottom:1px solid rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:space-between;'});fr.innerHTML=`<div style="display:flex;align-items:center;gap:8px;"><span style="width:6px;height:6px;border-radius:50%;background:rgba(234,179,8,0.4);display:inline-block;"></span><span style="font-size:12px;color:#e5e5e5;">${it.label}</span></div><span style="font-size:10px;color:#525252;">${it.date}</span>`;fuList.appendChild(fr);});}
    fs.appendChild(fuList);
    body.appendChild(fs);

    const cats=Array.isArray(p.network_category)?p.network_category:[p.network_category||'OTHERS'];
    const catBadges=el('div',{style:'display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;'});
    cats.forEach(c=>{const m=NET_CAT[c]||NET_CAT.OTHERS;const b=el('div',{style:`display:inline-flex;align-items:center;gap:6px;padding:5px 10px;background:${m.bg};border:1px solid ${m.color}44;font-size:10px;font-weight:900;color:${m.color};letter-spacing:0.15em;text-transform:uppercase;`});b.innerHTML=`<span style="width:6px;height:6px;border-radius:50%;background:${m.dot};"></span>${m.label}`;catBadges.appendChild(b);});
    body.appendChild(catBadges);

    if((p.keyword||[]).length){
      const kw=el('div',{style:'display:flex;flex-wrap:wrap;gap:4px;margin-bottom:16px;'});
      (p.keyword||[]).forEach(k=>{const b=el('div',{style:'padding:3px 8px;background:rgba(234,179,8,0.08);border:1px solid rgba(234,179,8,0.2);color:#eab308;font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:0.1em;'},k);kw.appendChild(b);});
      body.appendChild(kw);
    }

    const sections=[
      {label:'Biography',icon:'👤',data:p.biography,fields:['age','sex','marital','currentCar']},
      {label:'Location',icon:'📍',data:{hometown:p.family?.hometown,currentStay:p.family?.currentStay}},
      {label:'Occupation',icon:'💼',data:p.occupation,fields:['occ_position','occ_education','occ_salary']},
      {label:'Recreation',icon:'🎯',data:p.recreation,fields:['rec_hobby','rec_sports']},
    ];
    sections.forEach(s=>{
      const d=s.data||{};
      const keys=s.fields||Object.keys(d);
      const vals=keys.filter(k=>d[k]&&String(d[k]).trim());
      if(!vals.length)return;
      const sec=el('div',{style:'margin-bottom:16px;'});
      sec.innerHTML=`<div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;"><span style="font-size:11px;color:#eab308;">${s.icon}</span><span style="font-size:11px;font-weight:900;color:#d4d4d4;letter-spacing:0.1em;text-transform:uppercase;">${s.label}</span><div style="flex:1;height:1px;background:rgba(255,255,255,0.05);"></div></div>`;
      const g=el('div',{class:'se-profile-grid',style:'display:grid;grid-template-columns:1fr 1fr;gap:12px;'});
      vals.forEach(k=>{
        const item=el('div',{});
        const lbl=k.replace(/^(occ_|rec_|fam_|health_|money_|dream_)/,'').replace(/_/,' ');
        item.innerHTML=`<div style="font-size:9px;font-weight:900;color:#525252;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:3px;">${lbl}</div><div style="font-size:12px;color:#e5e5e5;">${d[k]}</div>`;
        g.appendChild(item);
      });
      sec.appendChild(g);
      body.appendChild(sec);
    });

    if(p.notes&&p.notes.trim()){
      const nb=el('div',{style:'margin-bottom:16px;padding:12px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);'});
      nb.innerHTML=`<div style="font-size:9px;font-weight:900;color:#525252;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px;">Notes</div><div style="font-size:12px;color:#e5e5e5;line-height:1.6;">${p.notes}</div>`;
      body.appendChild(nb);
    }
  }

  modal.appendChild(body);

  const footer=el('div',{class:'se-modal-footer',style:'padding:14px 24px;border-top:1px solid rgba(255,255,255,0.06);display:flex;gap:10px;background:rgba(10,10,10,0.98);flex-shrink:0;'});
  const cancelBtn=el('button',{style:'flex:1;padding:10px;border:1px solid rgba(255,255,255,0.05);background:transparent;color:#737373;font-size:11px;font-family:inherit;letter-spacing:0.2em;text-transform:uppercase;cursor:pointer;'},state.editMode?'Cancel':'Close');
  cancelBtn.onclick=()=>{state.modalOpen=false;state.selectedPerson=null;state.editMode=false;render();};

  if(!isArchived){
    if(!state.editMode){
      const editBtn=el('button',{style:'padding:8px 16px;background:#1a1a1a;border:1px solid #eab308;color:#eab308;font-size:10px;font-family:inherit;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;'},'✏ Edit');
      editBtn.onclick=()=>{state.editMode=true;render();};
      footer.appendChild(editBtn);
    }else{
      const saveBtn=el('button',{style:'flex:3;padding:10px;background:#fff;border:none;color:#000;font-size:11px;font-family:inherit;font-weight:900;letter-spacing:0.2em;text-transform:uppercase;cursor:pointer;'},'✓ Save Changes');
      saveBtn.onclick=()=>{
        const inputs=modal.querySelectorAll('[data-field]');
        inputs.forEach(inp=>{
          const fld=inp.dataset.field;
          const path=inp.dataset.path;
          const v=inp.value;
          if(path){if(!p[path])p[path]={};p[path][fld]=v;}
          else p[fld]=v;
        });
        if(!p.id){p.id=String(++state.nextId);p.status='active';p.created_at=new Date().toISOString();p.last_interaction=new Date().toISOString();state.people.push(p);}
        state.editMode=false;render();
      };
      footer.appendChild(saveBtn);
    }
  }
  footer.insertBefore(cancelBtn,footer.firstChild);
  modal.appendChild(footer);
  overlay.appendChild(modal);
  return overlay;
}

function renderEditForm(p,isNew){
  const form=el('div',{});

  const fields=[
    {label:'Name',field:'name',path:null,req:true},
    {label:'Phone',field:'phone',path:null},
    {label:'Age',field:'age',path:'biography'},
    {label:'Sex',field:'sex',path:'biography',type:'select',opts:['','Male','Female']},
    {label:'Marital',field:'marital',path:'biography',type:'select',opts:['Single','Married','Divorced','In Relationship']},
    {label:'Current Stay',field:'currentStay',path:'family'},
    {label:'Hometown',field:'hometown',path:'family'},
    {label:'Position',field:'occ_position',path:'occupation'},
    {label:'Salary (RM)',field:'occ_salary',path:'occupation'},
    {label:'Notes',field:'notes',path:null,type:'textarea'},
  ];

  const catSec=el('div',{style:'margin-bottom:16px;'});
  catSec.innerHTML=`<div style="font-size:10px;font-weight:900;color:#525252;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid rgba(255,255,255,0.06);">Network Category</div>`;
  const catGrid=el('div',{class:'se-cat-grid',style:'display:grid;grid-template-columns:1fr 1fr;gap:6px;'});
  const curCats=Array.isArray(p.network_category)?[...p.network_category]:['OTHERS'];
  Object.entries(NET_CAT).forEach(([k,v])=>{
    const isA=curCats.includes(k);
    const b=el('button',{type:'button',style:`display:flex;align-items:center;gap:8px;padding:6px 10px;background:${isA?v.bg:'rgba(255,255,255,0.02)'};border:1px solid ${isA?v.color+'66':'rgba(255,255,255,0.05)'};color:${isA?v.color:'#525252'};font-size:10px;font-family:inherit;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;text-align:left;`});
    b.innerHTML=`<span style="width:6px;height:6px;border-radius:50%;background:${isA?v.dot:'#525252'};flex-shrink:0;"></span>${v.label}`;
    b.onclick=()=>{
      const idx=p.network_category.indexOf(k);
      if(idx>-1)p.network_category.splice(idx,1);
      else p.network_category.push(k);
      render();
    };
    catGrid.appendChild(b);
  });
  catSec.appendChild(catGrid);
  form.appendChild(catSec);

  const fSec=el('div',{style:'margin-bottom:12px;'});
  fSec.innerHTML=`<div style="font-size:10px;font-weight:900;color:#525252;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid rgba(255,255,255,0.06);">Profile Fields</div>`;
  const fGrid=el('div',{class:'se-edit-grid',style:'display:grid;grid-template-columns:1fr 1fr;gap:8px;'});

  fields.forEach(f=>{
    const wrapper=el('div',{style:f.type==='textarea'?'grid-column:span 2':''});
    wrapper.innerHTML=`<label style="font-size:9px;font-weight:900;color:#525252;letter-spacing:0.15em;text-transform:uppercase;display:block;margin-bottom:4px;">${f.label}${f.req?' *':''}</label>`;
    let inp;
    const val=(f.path?((p[f.path]||{})[f.field]):p[f.field])||'';
    if(f.type==='select'){
      inp=el('select',{'data-field':f.field,'data-path':f.path||'',style:'width:100%;background:#111;border:1px solid #333;color:#fff;font-family:inherit;font-size:12px;padding:7px 8px;outline:none;'});
      f.opts.forEach(o=>{const opt=el('option',{value:o},o||'-- Select --');if(o===val)opt.selected=true;inp.appendChild(opt);});
    }else if(f.type==='textarea'){
      inp=el('textarea',{'data-field':f.field,'data-path':f.path||'',rows:'3',style:'width:100%;background:#111;border:1px solid #333;color:#fff;font-family:inherit;font-size:12px;padding:7px 10px;outline:none;resize:none;'},val);
    }else{
      inp=el('input',{type:'text','data-field':f.field,'data-path':f.path||'',value:val,style:'width:100%;background:#111;border:1px solid #333;color:#fff;font-family:inherit;font-size:12px;padding:7px 10px;outline:none;'});
    }
    wrapper.appendChild(inp);
    fGrid.appendChild(wrapper);
  });
  fSec.appendChild(fGrid);
  form.appendChild(fSec);
  return form;
}

function el(tag,attrs={},text=''){
  const e=document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style')e.style.cssText=v;
    else if(k==='class')e.className=v;
    else if(k.startsWith('data-'))e.setAttribute(k,v);
    else e[k]=v;
  });
  if(text)e.textContent=text;
  return e;
}

state.calYear=new Date().getFullYear();
state.calMonth=new Date().getMonth();
state.calDate=todayIso();
render();
</script>
